    git:
      url: https://github.com/poppingmoon/isar-community
      ref: 81a5bb0aa550a6c75a190924a5f1cb6e4c664b7b
      path: packages/isar_community
  jni:
    git:
      url: https://github.com/poppingmoon/native
      ref: b380193822cbc7a6c74373edd3a2185edd89ba56
      path: pkgs/jni
  unifiedpush_android:
    git:
      url: https://github.com/poppingmoon/flutter-connector
      ref: b3eb98b51675e6177b781dede88ac2b489008244
      path: unifiedpush_android
  webcrypto:
    git:
      url: https://github.com/poppingmoon/webcrypto.dart
      ref: 78c1829c9eb0749ada4043ca64b79e01da744a27

hooks:
  user_defines:
    isar_community:
      local_build: false

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/BIZ_UDGothic/OFL.txt
    - assets/fonts/Noto_Serif_JP/OFL.txt
    - assets/fonts/Pretendard/LICENSE.txt
    - assets/icons/aria.png
    - assets/misskey/COPYING
    - assets/misskey/LICENSE
    - assets/misskey/packages/frontend/assets/
    - assets/misskey/packages/frontend/assets/sounds/aisha/
    - assets/misskey/packages/frontend/assets/sounds/noizenecio/
    - assets/misskey/packages/frontend/assets/sounds/syuilo/
  fonts:
    - family: BIZ UDGothic
      fonts:
        - asset: assets/fonts/BIZ_UDGothic/BIZUDGothic-Regular.ttf
          weight: 400
        - asset: assets/fonts/BIZ_UDGothic/BIZUDGothic-Bold.ttf
          weight: 700
    - family: Noto Serif JP
      fonts:
        - asset: assets/fonts/Noto_Serif_JP/NotoSerifJP-VariableFont_wght.ttf
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard/PretendardVariable.ttf

flutter_launcher_icons:
  image_path: assets/icons/aria.png
  android: true
  adaptive_icon_foreground: assets/icons/aria_android.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_monochrome: assets/icons/aria_android_monochrome.png
  windows:
    generate: true
